name: CI/CD for Smart Agent

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # ============================================
  # CONTINUOUS INTEGRATION (TEST)
  # ============================================
  test:
    name: Continuous Integration (Test)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint code with ruff
      run: |
        pip install ruff
        ruff check app/ --output-format=github --target-version=py310 || echo "Linting issues found."

    - name: Run tests with pytest and coverage
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 7

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: junit/
        retention-days: 7
      if: ${{ always() }}

  # ============================================
  # CONTINUOUS DEPLOYMENT (BUILD & DEPLOY)
  # ============================================
  build-and-deploy:
    name: Continuous Deployment (Build & Deploy)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment Notification
        run: |
          echo "🎉 Docker image pushed successfully!"
          echo "📦 Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"

      # ============================================
      # OPTIONAL: Deploy to Streamlit Cloud
      # ============================================
      # Uncomment and configure if using Streamlit Cloud
      # - name: Deploy to Streamlit Cloud
      #   run: |
      #     echo "Deploying to Streamlit Cloud..."
      #     # Streamlit Cloud automatically deploys from GitHub
      #     # No action needed if repository is connected

