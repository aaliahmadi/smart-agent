name: CI/CD for Smart Agent

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # ------ CONTINUOUS INTEGRATION (TEST) ------
  test:
    name: Continuous Integration (Test)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install testing tools
        pip install pytest pytest-cov

    # Here you should create a dummy test file or adapt to your actual tests
    - name: Run tests with pytest
      run: |
        # This is a placeholder. If you have actual tests, replace this.
        # For example: pytest app/ -v
        echo "No tests defined yet. Create a test file and update this step."

    # Optional: Lint the code with ruff (a fast Python linter)
    - name: Lint code with ruff
      run: |
        pip install ruff
        ruff check app/ --output-format=github --target-version=py310 || echo "Linting issues found but not failing."

  # ------ CONTINUOUS DEPLOYMENT (BUILD & DEPLOY) ------
  build-and-deploy:
    name: Continuous Deployment (Build & Deploy)
    needs: test
    runs-on: ubuntu-latest
    # Only run this job on pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      # ----- (Optional) Example Deployment Steps -----
      # Uncomment and adapt one of these blocks to deploy to a cloud platform.
      #
      # - name: Deploy to Streamlit Cloud (via API or custom action)
      #   run: |
      #     echo "Add deployment step for Streamlit Cloud here."
